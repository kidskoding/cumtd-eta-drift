name: Deploy Databricks Bundle

on:
  workflow_dispatch:
    inputs:
      target:
        description: Databricks bundle target to deploy
        required: true
        default: prod
        type: choice
        options:
          - dev
          - prod
  push:
    branches:
      - master
    paths:
      - "databricks.yml"
      - "dbt/**"
      - "notebooks/**"
      - ".github/workflows/deploy-databricks.yml"

permissions:
  contents: read

jobs:
  deploy:
    name: Validate and deploy Databricks bundle
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.target || 'prod' }}

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      BUNDLE_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.target || 'prod' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main

      - name: Check Databricks credentials
        run: |
          if [ -z "$DATABRICKS_HOST" ]; then
            echo "Missing GitHub Actions secret: DATABRICKS_HOST"
            exit 1
          fi

          if [ -z "$DATABRICKS_TOKEN" ]; then
            echo "Missing GitHub Actions secret: DATABRICKS_TOKEN"
            exit 1
          fi

      - name: Normalize Databricks host
        run: |
          clean_host="$(printf '%s' "$DATABRICKS_HOST" | tr -d '[:space:]')"

          case "$clean_host" in
            https://*)
              echo "DATABRICKS_HOST=$clean_host" >> "$GITHUB_ENV"
              ;;
            *)
              echo "DATABRICKS_HOST must be a workspace URL that starts with https://"
              exit 1
              ;;
          esac

      - name: Validate bundle
        run: databricks bundle validate --target "$BUNDLE_TARGET"

      - name: Deploy bundle
        run: databricks bundle deploy --target "$BUNDLE_TARGET"
