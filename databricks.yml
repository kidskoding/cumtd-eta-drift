bundle:
  name: cumtd_eta_drift

variables:
  catalog:
    description: Unity Catalog catalog for project tables.
    default: workspace
  schema:
    description: Target schema/database for Delta tables.
    default: cumtd_eta_drift
  stop_ids:
    description: Comma-separated CUMTD stop IDs to poll.
    default: it
  s3_bucket:
    description: S3 bucket containing Lambda departure snapshots.
    default: cumtd-eta-drift
  s3_prefix:
    description: S3 prefix containing Lambda departure snapshots.
    default: raw-departures

resources:
  jobs:
    cumtd_eta_drift_audit:
      name: CUMTD v3 Transit ETA Drift Audit
      schedule:
        quartz_cron_expression: "0 0/30 * * * ?"
        timezone_id: America/Chicago
        pause_status: UNPAUSED
      max_concurrent_runs: 1
      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - dbt-databricks>=1.10,<2
      tasks:
        - task_key: ingest_departure_snapshots
          notebook_task:
            notebook_path: notebooks/01_ingest_departure_snapshots.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              s3_bucket: ${var.s3_bucket}
              s3_prefix: ${var.s3_prefix}
              stop_ids: ${var.stop_ids}
              lookahead_minutes: "60"
        - task_key: compute_departure_drift_metrics
          depends_on:
            - task_key: ingest_departure_snapshots
          environment_key: default
          dbt_task:
            warehouse_id: 05d2ded59afce66c
            catalog: ${var.catalog}
            schema: ${var.schema}
            project_directory: dbt
            commands:
              - "dbt run --vars '{\"catalog\": \"${var.catalog}\", \"raw_schema\": \"${var.schema}\", \"mart_schema\": \"${var.schema}\"}'"
        - task_key: test_dbt_models
          depends_on:
            - task_key: compute_departure_drift_metrics
          environment_key: default
          dbt_task:
            warehouse_id: 05d2ded59afce66c
            catalog: ${var.catalog}
            schema: ${var.schema}
            project_directory: dbt
            commands:
              - "dbt test --vars '{\"catalog\": \"${var.catalog}\", \"raw_schema\": \"${var.schema}\", \"mart_schema\": \"${var.schema}\"}'"
        - task_key: verify_pipeline_health
          depends_on:
            - task_key: test_dbt_models
          notebook_task:
            notebook_path: notebooks/04_verify_pipeline_health.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              min_raw_rows: "1"

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.databricks_bundles/${bundle.name}/${bundle.target}
  prod:
    workspace:
      root_path: /Workspace/Users/anirudhkonidala@gmail.com/.databricks_bundles_v2/${bundle.name}/${bundle.target}
